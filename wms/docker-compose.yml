# Local PostgreSQL for WMS — matches .env.example defaults.
# Start: docker compose up -d
# Stop:  docker compose down
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wms
    ports:
      - "5432:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  wms_pgdata:
