# FRP Client config — runs on Jetson
# Deploy to: ~/frp/frpc.ini on your Jetson
#
# IMPORTANT: Replace server_addr with your EC2 public IP.
#            Replace token to match the server's token.

[common]
server_addr = 3.147.40.247
server_port = 7000
token = arvindh-srinikhil

# SSH tunnel: EC2:6000 → Jetson:22
[ssh]
type = tcp
local_ip = 127.0.0.1
local_port = 22
remote_port = 6000

# HTTP API tunnel: EC2:6100 → Jetson:8080 (nventr_bridge)
[http]
type = tcp
local_ip = 127.0.0.1
local_port = 8080
remote_port = 6100
